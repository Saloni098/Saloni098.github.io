<style>
  .play-header { margin-bottom: 24px; }
  .play-header h1 {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 500;
    font-size: 32px;
    margin-bottom: 8px;
  }
  .play-header p { font-size: 16px; color: var(--gray-text); }

  .craft-grid { display: flex; flex-direction: column; gap: 36px; }
  .craft-card {
    width: 100%;
    min-height: 240px;
    background: var(--bg-pill);
    border: 0.5px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .craft-card img {
    width: 100%;
    height: auto;
    object-fit: contain;
  .craft-card .placeholder-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    color: var(--gray-text);
  }
}
  .play-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    width: 100%;
  }
  .play-card {
    aspect-ratio: 3 / 2; /* Ensures perfect layout alignment across all rows */
    background: var(--bg-pill);
    border: 0.5px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .play-card img {
    width: 100%;
    height: 100%;
    object-fit: cover; /* Centers and crops image content cleanly to align */
    display: block;
    transition: transform 0.3s ease;
  }
  .play-card img:hover {
    transform: scale(1.03);
  }

  /* Page wrapper width controls */
  .page-wrap {
    max-width: 1200px; /* Default Mac screen size */
    margin: 0 auto;
    width: 100%;
  }

  @media (min-width: 1700px) {
    .page-wrap {
      max-width: 1500px; /* Bigger screen sizes */
    }
  }

  @media (max-width: 768px) {
    .play-grid {
      grid-template-columns: 1fr; /* Stack vertically on tablet/mobile */
    }
  }

  @media (max-width: 480px) {
    .page-wrap {
      max-width: 364px; /* Mobile screens width constraint */
      padding-left: 12px;
      padding-right: 12px;
      margin: 0 auto;
    }
    .play-grid {
      gap: 16px;
    }
  }

  /* contact + view case studies footer block, reused from index hero style */
  .play-footer-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 60px;
    flex-wrap: wrap;
    gap: 20px;
  }
</style>
