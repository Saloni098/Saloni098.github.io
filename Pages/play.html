<link rel="stylesheet" href="../CSS/shared.css" />
<style>
  .play-header { margin-bottom: 24px; }
  .play-header h1 {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 500;
    font-size: 32px;
    margin-bottom: 8px;
  }
  .play-header p { font-size: 16px; color: var(--gray-text); }

  .craft-grid { display: flex; flex-direction: column; gap: 36px; }
  .craft-card {
    width: 100%;
    min-height: 240px;
    background: var(--bg-pill);
    border: 0.5px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .craft-card img {
    width: 100%;
    height: auto;
    object-fit: contain;
    display: block;
  }
  .craft-card .placeholder-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    color: var(--gray-text);
  }

  /* contact + view case studies footer block, reused from index hero style */
  .play-footer-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 60px;
    flex-wrap: wrap;
    gap: 20px;
  }

  @media (max-width: 768px) {
    .craft-card { min-height: 180px; }
  }
</style>
</head>
